<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type scale</title>
<!-- Shared preview card scaffolding. Each preview file includes it directly. -->
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #f9f9f8;
    color: #1a1a18;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    line-height: 1.5;
  }
  body { padding: 16px; }
  .pv-grid { display: grid; gap: 8px; }
  .pv-row  { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .pv-swatch {
    border: 0.5px solid #e5e4e0;
    border-radius: 8px;
    background: #fff;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .pv-swatch .chip { height: 38px; }
  .pv-swatch .meta { padding: 6px 8px; }
  .pv-swatch .name { font-size: 11px; font-weight: 500; color: #1a1a18; }
  .pv-swatch .hex  { font-size: 10px; color: #6b6b68;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  .pv-card {
    background: #fff;
    border: 0.5px solid #e5e4e0;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .pv-eyebrow {
    font-size: 11px; font-weight: 500; color: #6b6b68;
    text-transform: uppercase; letter-spacing: .05em;
  }
  .pv-tag {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 2px 7px; border-radius: 4px;
  }
  .pv-tag-danger  { background: #FAECE7; color: #712B13; }
  .pv-tag-warn    { background: #FAEEDA; color: #633806; }
  .pv-tag-success { background: #EAF3DE; color: #27500A; }
  .pv-tag-info    { background: #E6F1FB; color: #0C447C; }
  .pv-tag-gray    { background: #F1EFE8; color: #444441; }
  .pv-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .pv-btn {
    cursor: pointer;
    border: 0.5px solid #e5e4e0;
    background: #fff;
    color: #1a1a18;
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-family: inherit;
  }
  .pv-btn-primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .pv-btn-danger  { background: #D85A30; color: #fff; border-color: #D85A30; }
  .pv-input {
    border: 0.5px solid #e5e4e0; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; background: #fff;
    color: #1a1a18; font-family: inherit; width: 100%;
  }
  .pv-input:focus { outline: none; border-color: #1D9E75; }
  .pv-muted { color: #6b6b68; }
  .pv-hint  { color: #a0a09d; }
  .pv-mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
</style>

<style>body { padding: 16px; }</style>
</head>
<body>

<div class="pv-grid" style="gap:6px">
  <div style="display:flex;align-items:baseline;gap:12px"><span class="pv-mono pv-hint" style="font-size:10px;width:46px">24/500</span><span style="font-size:24px;font-weight:500">42</span><span class="pv-hint" style="font-size:10px">stat numeral</span></div>
  <div style="display:flex;align-items:baseline;gap:12px"><span class="pv-mono pv-hint" style="font-size:10px;width:46px">20/400</span><span style="font-size:20px;font-weight:400">Email subject line</span></div>
  <div style="display:flex;align-items:baseline;gap:12px"><span class="pv-mono pv-hint" style="font-size:10px;width:46px">16/500</span><span style="font-size:16px;font-weight:500">Today's digest</span><span class="pv-hint" style="font-size:10px">panel h2</span></div>
  <div style="display:flex;align-items:baseline;gap:12px"><span class="pv-mono pv-hint" style="font-size:10px;width:46px">13/400</span><span style="font-size:13px">Triages your inbox each morning at 9 AM.</span><span class="pv-hint" style="font-size:10px">body</span></div>
  <div style="display:flex;align-items:baseline;gap:12px"><span class="pv-mono pv-hint" style="font-size:10px;width:46px">11/400</span><span style="font-size:11px;color:#6b6b68">cached 4m ago · 12 emails triaged</span><span class="pv-hint" style="font-size:10px">meta</span></div>
</div>
</body>
</html>
